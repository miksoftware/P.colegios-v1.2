# El VPS Deployer controla el project name via COMPOSE_PROJECT_NAME
# Variables esperadas del deployer:
#   COMPOSE_PROJECT_NAME  → nombre del proyecto (ej: colegios)
#   APP_DOMAIN            → dominio público (ej: soportesypsas.com)
#   DB_DATABASE, DB_USERNAME, DB_PASSWORD, DB_ROOT_PASSWORD
#   DB_EXTERNAL_PORT      → puerto externo para MySQL (ej: 3307)

services:
  php:
    build:
      context: ./resources
      dockerfile: Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME:-colegios}_php
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
      - ./php-config/custom.ini:/usr/local/etc/php/conf.d/custom.ini
    networks:
      - app_network
      - traefik_network
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - APP_ENV=production
      - APP_DEBUG=false

  mysql:
    image: mysql:8.0
    container_name: ${COMPOSE_PROJECT_NAME:-colegios}_mysql
    restart: unless-stopped
    command:
      - --default-authentication-plugin=mysql_native_password
      - --performance-schema=OFF
      - --innodb-buffer-pool-size=64M
      - --max-connections=50
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root123}
      MYSQL_DATABASE: ${DB_DATABASE:-colegios_db}
      MYSQL_USER: ${DB_USERNAME:-colegios_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "${DB_EXTERNAL_PORT:-3306}:3306"
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-root123}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-colegios}_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - app_network
    healthcheck:
      test: [CMD, redis-cli, ping]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:alpine
    container_name: ${COMPOSE_PROJECT_NAME:-colegios}_nginx
    restart: unless-stopped
    volumes:
      - ./:/var/www/html
      - ./resources/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - app_network
      - traefik_network
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik_network"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME:-colegios}-http.rule=Host(`${APP_DOMAIN:-localhost}`) || Host(`www.${APP_DOMAIN:-localhost}`)"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME:-colegios}-http.entrypoints=web"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME:-colegios}-http.middlewares=${COMPOSE_PROJECT_NAME:-colegios}-redirect-https"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME:-colegios}-https.rule=Host(`${APP_DOMAIN:-localhost}`) || Host(`www.${APP_DOMAIN:-localhost}`)"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME:-colegios}-https.entrypoints=websecure"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME:-colegios}-https.tls=true"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME:-colegios}-https.tls.certresolver=letsencrypt"
      - "traefik.http.services.${COMPOSE_PROJECT_NAME:-colegios}-service.loadbalancer.server.port=80"
      - "traefik.http.middlewares.${COMPOSE_PROJECT_NAME:-colegios}-redirect-https.redirectscheme.scheme=https"
      - "traefik.http.middlewares.${COMPOSE_PROJECT_NAME:-colegios}-redirect-https.redirectscheme.permanent=true"

networks:
  app_network:
    driver: bridge
  traefik_network:
    external: true

volumes:
  mysql_data:
  redis_data:
