name: colegios

services:
  php:
    build: .
    container_name: colegios_php
    working_dir: /var/www/html
    volumes:
      - ./src:/var/www/html
      - ./php-config/custom.ini:/usr/local/etc/php/conf.d/custom.ini
    networks:
      - colegios_network
      - traefik_network
    restart: unless-stopped
    depends_on:
      - mysql
      - redis
    environment:
      - APP_ENV=production
      - APP_DEBUG=false

  mysql:
    image: mysql:8.0
    container_name: colegios_mysql
    restart: unless-stopped
    command:
      - --default-authentication-plugin=mysql_native_password
      - --performance-schema=OFF
      - --innodb-buffer-pool-size=64M
      - --max-connections=50
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: colegios_db
      MYSQL_USER: colegios_user
      MYSQL_PASSWORD: d076uRzbWTamnF
    volumes:
      - colegios_mysql_data:/var/lib/mysql
    ports:
      - "3307:3306"
    networks:
      - colegios_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot123"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: colegios_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - colegios_redis_data:/data
    networks:
      - colegios_network
    healthcheck:
      test: [CMD, redis-cli, ping]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:alpine
    container_name: colegios_nginx
    restart: unless-stopped
    volumes:
      - ./src:/var/www/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - colegios_network
      - traefik_network
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik_network"
      - "traefik.http.routers.colegios-http.rule=Host(`soportesypsas.com`) || Host(`www.soportesypsas.com`)"
      - "traefik.http.routers.colegios-http.entrypoints=web"
      - "traefik.http.routers.colegios-http.middlewares=colegios-redirect-https"
      - "traefik.http.routers.colegios-https.rule=Host(`soportesypsas.com`) || Host(`www.soportesypsas.com`)"
      - "traefik.http.routers.colegios-https.entrypoints=websecure"
      - "traefik.http.routers.colegios-https.tls=true"
      - "traefik.http.routers.colegios-https.tls.certresolver=letsencrypt"
      - "traefik.http.services.colegios-service.loadbalancer.server.port=80"
      - "traefik.http.middlewares.colegios-redirect-https.redirectscheme.scheme=https"
      - "traefik.http.middlewares.colegios-redirect-https.redirectscheme.permanent=true"

networks:
  colegios_network:
    driver: bridge
  traefik_network:
    external: true

volumes:
  colegios_mysql_data:
  colegios_redis_data:
